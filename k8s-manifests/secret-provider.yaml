apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: i-db-secret-provider
  namespace: i-prod # Bound strictly to your production space
spec:
  provider: aws
  serviceAccountName: i-service-account
  parameters:
    objects: |
      - objectName: "kriva/production/i-db-credentials" # Must match your exact AWS Secrets Manager secret name
        objectType: "secretsmanager"
        jmespath:
          - path: "username"
            objectAlias: "DB_USERNAME"
          - path: "password"
            objectAlias: "DB_PASSWORD"

  # This part automatically syncs the AWS secret into a standard Kubernetes Secret
  secretObjects:
    - secretName: i-db-k8s-secret
      type: Opaque
      data:
        - objectName: DB_USERNAME
          key: username
        - objectName: DB_PASSWORD
          key: password
